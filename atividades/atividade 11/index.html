<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador Regressivo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Contador Regressivo</h1>
        <p>Digite um número para iniciar a contagem.</p>

        <div class="card">
            <input type="number" id="numeroInicio" placeholder="Ex: 10">

            <button onclick="iniciarContagem()">Iniciar Regressão</button>
            
            <div id="resultado" class="counter-display">
                0
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
