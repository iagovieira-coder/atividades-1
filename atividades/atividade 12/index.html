<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Adivinhação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Jogo de Adivinhação</h1>
        <p>Tente adivinhar o número entre 1 e 100!</p>

        <div class="card">
            <input type="number" id="chute" placeholder="Seu palpite">
            <button onclick="verificarChute()">Chutar</button>
            <button onclick="reiniciarJogo()" class="btn-reset">Novo Jogo</button>
            
            <div id="resultado" class="result-box">
                Boa sorte!
            </div>
            <p id="tentativas">Tentativas: 0</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
