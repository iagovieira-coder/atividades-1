<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Desconto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Calculadora de Desconto</h1>
        <p>Insira o valor total da compra para calcular o desconto.</p>

        <div class="card">
            <label for="valorCompra">Valor da Compra (R$):</label>
            <input type="number" id="valorCompra" placeholder="Ex: 550.00" step="0.01">

            <button onclick="calcularDesconto()">Calcular Total</button>
            
            <div id="resultado" class="result-box">
                O resumo aparecerá aqui...
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
