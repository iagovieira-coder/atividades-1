<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronômetro JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Cronômetro</h1>
        
        <div class="card">
            <div id="display" class="timer-display">00:00:00</div>

            <div class="controls">
                <button onclick="iniciar()" class="btn-start">Iniciar</button>
                <button onclick="pausar()" class="btn-pause">Pausar</button>
                <button onclick="reiniciar()" class="btn-reset">Reiniciar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
