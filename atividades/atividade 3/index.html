<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Calculadora de IMC</h1>
        <p>Insira seus dados para calcular o Índice de Massa Corporal.</p>

        <div class="card">
            <label for="peso">Peso (kg):</label>
            <input type="number" id="peso" placeholder="Ex: 75.5" step="0.1">

            <label for="altura">Altura (m):</label>
            <input type="number" id="altura" placeholder="Ex: 1.75" step="0.01">

            <button onclick="calcularIMC()">Calcular IMC</button>
            
            <div id="resultado" class="result-box">
                O resultado aparecerá aqui...
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
