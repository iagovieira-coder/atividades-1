<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Notas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Média Escolar</h1>
        <p>Informe as três notas do aluno para calcular a média.</p>

        <div class="card">
            <label>Nota 1:</label>
            <input type="number" id="nota1" placeholder="0.0" step="0.1" min="0" max="10">

            <label>Nota 2:</label>
            <input type="number" id="nota2" placeholder="0.0" step="0.1" min="0" max="10">

            <label>Nota 3:</label>
            <input type="number" id="nota3" placeholder="0.0" step="0.1" min="0" max="10">

            <button onclick="calcularMedia()">Calcular Média Final</button>
            
            <div id="resultado" class="result-box">
                O resultado aparecerá aqui...
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
