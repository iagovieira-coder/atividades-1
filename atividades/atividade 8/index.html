<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Moedas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Conversor de Moedas</h1>
        <p>Converta Reais (R$) para Dólar (US$)</p>

        <div class="card">
            <label for="valorReal">Valor em Reais (R$):</label>
            <input type="number" id="valorReal" placeholder="Ex: 100.00" step="0.01">

            <label for="cotacao">Cotação do Dólar hoje:</label>
            <input type="number" id="cotacao" placeholder="Ex: 5.10" step="0.01">

            <button onclick="converterMoeda()">Converter para Dólar</button>
            
            <div id="resultado" class="result-box">
                O resultado aparecerá aqui...
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>.
