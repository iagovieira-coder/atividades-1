<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Senha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Validador de Senha</h1>
        <p>Digite uma senha para testar a força.</p>

        <div class="card">
            <label for="senha">Digite sua senha:</label>
            <input type="password" id="senha" placeholder="Sua senha aqui...">

            <button onclick="verificarSenha()">Verificar Força</button>
            
            <div id="resultado" class="result-box">
                Aguardando senha...
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
